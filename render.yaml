services:
  - type: web
    name: icp-crm
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn crm.app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7

  - type: cron
    name: icp-scraper-daily
    env: python
    schedule: 0 5 * * *
    buildCommand: pip install -r requirements.txt
    startCommand: bash start_scraper.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
